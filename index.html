<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L8er</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D0A08;
      color: #F5EDE4;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      text-align: center;
    }
    .title {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 4px;
      color: #F5EDE4;
      margin-bottom: 24px;
    }
    .body {
      font-size: 17px;
      font-weight: 400;
      color: #9C8878;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 48px;
    }
    .btn {
      background: #E8824A;
      color: #F5EDE4;
      font-size: 16px;
      font-weight: 600;
      padding: 18px 48px;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 0 40px rgba(232,130,74,0.4);
    }
    .footer {
      margin-top: 48px;
      font-size: 13px;
      color: rgba(156,136,120,0.5);
    }
  </style>
</head>
<body>
  <div class="title">L8er</div>
  <p class="body">Someone left something for you. You'll need the app to find it.</p>
  <a class="btn" href="https://testflight.apple.com/join/PCUrw5xD">Get the app</a>
  <p class="footer">Stop watching the world. Go be in it.</p>
</body>
</html>
